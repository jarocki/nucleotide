id: redis-info-probe

info:
  name: Redis INFO probe
  author: tester
  severity: info
  tags: redis,network

network:
  - inputs:
      - data: "*1\r\n$4\r\nINFO\r\n"
    host:
      - "{{Hostname}}"
    matchers:
      - type: word
        words:
          - "redis_version"

tcp:
  - inputs:
      - type: hex
        data: "2a 31 0d 0a 24 34 0d 0a 49 4e 46 4f 0d 0a"
    host:
      - "{{Hostname}}"
