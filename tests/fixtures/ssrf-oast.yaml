id: ssrf-oast-probe

info:
  name: Generic SSRF OAST Callback
  author: tester
  severity: high
  tags: ssrf,oast,interactsh

http:
  - method: POST
    path:
      - "{{BaseURL}}/api/v2/ssrf/check"
    headers:
      Content-Type: application/json
      User-Agent: NucleotideProbe/1.0
      X-Trace-Id: "abcdef-12345"
      Cookie: "sid=abc123; tracker=xyz"
    body: '{"callback":"http://{{interactsh-url}}/cb","probe":"trail-marker-7f4"}'
    matchers:
      - type: word
        part: interactsh_protocol
        words:
          - "http"
